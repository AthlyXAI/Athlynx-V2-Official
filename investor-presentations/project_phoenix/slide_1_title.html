<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Phoenix Title Slide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0A1F1C; /* Deep Emerald Green */
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* Left Content Area */
        .content-area {
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }

        .accent-line {
            width: 80px;
            height: 8px;
            background-color: #FFD700; /* Solar Yellow */
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 96px;
            font-weight: 700;
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: #00CC66; /* Emerald Green Accent */
            margin-bottom: 60px;
            letter-spacing: 1px;
        }

        .presenter-block {
            border-left: 2px solid #E6E6E6;
            padding-left: 24px;
            margin-top: auto;
        }

        .presenter-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #E6E6E6;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .presenter-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .partner-name {
            font-size: 20px;
            font-weight: 400;
            color: #FFD700;
        }

        .date {
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 1px;
            z-index: 3;
            color: #FFFFFF;
            background: rgba(10, 31, 28, 0.8);
            padding: 5px 10px;
        }

        /* Right Image Area */
        .image-area {
            position: relative;
            height: 100%;
            width: 100%;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
        }

        /* Geometric Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0A1F1C 0%, rgba(10, 31, 28, 0.4) 50%, rgba(10, 31, 28, 0) 100%);
        }
        
        /* Decorative geometric element */
        .geo-shape {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 200px;
            height: 200px;
            background: #00CC66;
            clip-path: polygon(100% 0, 0% 100%, 100% 100%);
            opacity: 0.8;
        }

    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-area">
            <div class="accent-line"></div>
            <h1>Project<br>Phoenix</h1>
            <div class="subtitle">AI Data Center Development<br>Taylorsville, Mississippi</div>
            
            <div class="presenter-block">
                <div class="presenter-label">Presented By</div>
                <div class="presenter-name">Dozier Holdings Group & Softmor</div>
                <div class="presenter-label">In Partnership With</div>
                <div class="partner-name">RunSun Energy Solutions</div>
            </div>
        </div>

        <div class="image-area">
            <img src="/home/ubuntu/project_phoenix_slides/images/slide1_datacenter.jpg" alt="Modern AI Data Center" class="hero-image">
            <div class="overlay"></div>
            <div class="geo-shape"></div>
        </div>

        <div class="date">January 2026</div>
    </div>
</body>
</html>
